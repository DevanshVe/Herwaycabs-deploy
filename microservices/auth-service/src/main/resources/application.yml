server:
  port: ${PORT:8081}
  error:
    include-message: always

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # Don't fail startup if Neon is momentarily cold — start and connect lazily
      initialization-fail-timeout: 0

  # Free-tier hardening: don't let a cold discovery server drag /actuator/health
  # DOWN and cause Render deploys to fail their health check.
  cloud:
    discovery:
      client:
        health-indicator:
          enabled: false

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      fail-on-empty-beans: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:https://herwaycabs-discovery.onrender.com/eureka}

  instance:
    prefer-ip-address: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

info:
  build:
    marker: auth-antpath-fix-v1

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true

logging:
  level:
    root: INFO
    com.herwaycabs: INFO
